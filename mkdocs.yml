site_name: Adversarial Traffic Engineering
site_description: A source-first red-team path for automated adversaries, browser-control evasion, and bounded resilience testing
site_url: https://matt-ops.github.io/awesome-adversarial-traffic-engineering/
strict: true
docs_dir: docs
site_dir: site
theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.sections
    - toc.follow
    - content.code.copy
  palette:
    - scheme: slate
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Use light mode
    - scheme: default
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Use dark mode
markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
nav:
  - Start the path: index.md
  - Start here: start-here.md
  - Path: path.md
  - Method:
      - Provenance: methodology/provenance.md
      - Authorization and safety: methodology/authorization-and-safety.md
      - Adversarial-control loop: methodology/adversarial-control-loop.md
      - Experiment design: methodology/experiment-design.md
  - Modules:
      - "00 - Method and authorization":
          - Overview: modules/00-method/index.md
          - The red-team role: modules/00-method/01-red-team-role.md
          - Scope and Rules of Engagement: modules/00-method/02-scope-and-rules.md
          - Experimental method: modules/00-method/03-experimental-method.md
      - "01 - HTTP and the edge":
          - Overview: modules/01-http-edge/index.md
          - Request and response: modules/01-http-edge/01-http-request-response.md
          - Sessions and workflows: modules/01-http-edge/02-sessions-and-workflows.md
          - DevTools Network: modules/01-http-edge/03-devtools-network.md
          - Edge request path: modules/01-http-edge/04-edge-request-path.md
      - "02 - Browser and JavaScript":
          - Overview: modules/02-browser-javascript/index.md
