site_name: Adversarial Traffic Engineering
site_description: A source-first red-team path for automated adversaries, browser-control evasion, and bounded resilience testing
site_url: https://matt-ops.github.io/awesome-adversarial-traffic-engineering/
strict: true
docs_dir: docs
site_dir: site
theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.sections
    - toc.follow
    - content.code.copy
  palette:
    - scheme: slate
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Use light mode
    - scheme: default
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Use dark mode
markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - markdown.extensions.md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true
hooks:
  - scripts/mkdocs_hooks.py
