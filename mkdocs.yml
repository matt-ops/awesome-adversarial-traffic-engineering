site_name: Adversarial Traffic Engineering
site_description: A source-first red-team path for automated adversaries, browser-control evasion, and bounded resilience testing
site_url: https://matt-ops.github.io/awesome-adversarial-traffic-engineering/
strict: true
docs_dir: docs
site_dir: site
theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.sections
    - toc.follow
    - content.code.copy
  palette:
    - scheme: slate
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Use light mode
    - scheme: default
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Use dark mode
markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
nav:
  - Start the path: index.md
  - Start here: start-here.md
  - Path: path.md
  - Method:
      - Provenance: methodology/provenance.md
      - Authorization and safety: methodology/authorization-and-safety.md
      - Adversarial-control loop: methodology/adversarial-control-loop.md
      - Experiment design: methodology/experiment-design.md
  - Modules:
      - "00 - Method and authorization":
          - Overview: modules/00-method/index.md
          - The red-team role: modules/00-method/01-red-team-role.md
          - Scope and Rules of Engagement: modules/00-method/02-scope-and-rules.md
          - Experimental method: modules/00-method/03-experimental-method.md
      - "01 - HTTP and the edge":
          - Overview: modules/01-http-edge/index.md
          - Request and response: modules/01-http-edge/01-http-request-response.md
          - Sessions and workflows: modules/01-http-edge/02-sessions-and-workflows.md
          - DevTools Network: modules/01-http-edge/03-devtools-network.md
          - Edge request path: modules/01-http-edge/04-edge-request-path.md
      - "02 - Browser and JavaScript":
          - Overview: modules/02-browser-javascript/index.md
          - Browser process model: modules/02-browser-javascript/01-browser-process-model.md
          - DOM and Web APIs: modules/02-browser-javascript/02-dom-and-web-apis.md
          - JavaScript core: modules/02-browser-javascript/03-javascript-core.md
          - Async, fetch, and errors: modules/02-browser-javascript/04-async-fetch-and-errors.md
      - "03 - Playwright":
          - Overview: modules/03-playwright/index.md
          - Object model: modules/03-playwright/01-object-model.md
          - First local browser: modules/03-playwright/02-first-browser.md
          - Contexts and state: modules/03-playwright/03-contexts-and-state.md
          - Network events: modules/03-playwright/04-network-events.md
          - Frames, workers, and CDP: modules/03-playwright/05-frames-workers-and-cdp.md
      - "04 - Automated abuse":
          - Overview: modules/04-automated-abuse/index.md
          - Abuse objectives: modules/04-automated-abuse/01-abuse-objectives.md
          - Workflow and API mapping: modules/04-automated-abuse/02-workflow-mapping.md
          - Authentication and rate controls: modules/04-automated-abuse/03-auth-and-rate-controls.md
          - Inventory and promotion abuse: modules/04-automated-abuse/04-inventory-and-promotion-abuse.md
          - Race and resource limits: modules/04-automated-abuse/05-race-and-resource-limits.md
      - "05 - Control reconnaissance": modules/05-control-recon/index.md
  - Labs:
      - Overview: labs/index.md
      - Foundation static site: labs/foundation/static-site.md
      - First Playwright workflow: labs/foundation/first-playwright.md
      - Integrated local API: labs/applied/local-api.md
      - Workflow authorization: labs/applied/workflow-authorization.md
  - References:
      - Overview: references/index.md
      - Source ledger: references/source-ledger.md
      - Glossary: references/glossary.md
  - Safety:
      - Boundary: safety/index.md
      - Local target policy: safety/local-target-policy.md
      - Traffic guardrails: safety/traffic-guardrails.md
