site_name: Adversarial Traffic Engineering
site_description: A red-team-first course for bot-control evasion, hostile browser automation, WAF bypass, and DDoS mitigation testing
strict: true
docs_dir: .docs-build
site_dir: site
theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - toc.follow
    - content.code.copy
  palette:
    - scheme: slate
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Use light mode
    - scheme: default
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Use dark mode
markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
nav:
  - Start: README.md
  - Course: COURSE.md
  - Extra labs: RESOURCES.md
  - Local lab: lab/README.md
  - Safety: SAFETY.md
