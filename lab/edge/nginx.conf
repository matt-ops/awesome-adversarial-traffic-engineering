events {}

http {
    limit_req_zone $binary_remote_addr zone=aate_per_ip:10m rate=10r/s;
    log_format aate escape=json '{"time":"$time_iso8601","request_id":"$request_id","method":"$request_method","uri":"$uri","status":$status,"request_time":$request_time}';
    access_log /var/log/nginx/access.log aate;

    server {
        listen 8080;
        client_max_body_size 64k;

        location / {
            limit_req zone=aate_per_ip burst=10 nodelay;
            proxy_connect_timeout 2s;
            proxy_read_timeout 5s;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header Host $host;
            proxy_pass http://app:8000;
        }
    }
}

