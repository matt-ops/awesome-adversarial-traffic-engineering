services:
  app:
    build:
      context: ..
      dockerfile: lab/app/Dockerfile
    container_name: aate-app
    networks: [aate-local]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)"]
      interval: 5s
      timeout: 3s
      retries: 5

  edge:
    image: nginx:1.29.0-alpine
    container_name: aate-edge
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./edge/nginx.conf:/etc/nginx/nginx.conf:ro
    networks: [aate-local, aate-loopback-publish]

networks:
  aate-local:
    name: aate-local
    internal: true
  aate-loopback-publish:
    name: aate-loopback-publish
