name: Publish course site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install site dependencies
        run: |
          python -m pip install ".[dev,docs]"
          npm ci
      - name: Build public content
        run: |
          python scripts/validate_sources.py
          python scripts/validate_lessons.py
          python scripts/validate_assessments.py
          python scripts/validate_labs.py
          python scripts/validate_load_scripts.py
          python scripts/validate_curriculum.py
          python scripts/check_internal_links.py
          python -m unittest discover -s lab/tests -v
          python -m mypy lab scripts
          ruff check .
          npm test
          npm run lint
          npm run format:check
          npm run markdown:lint
          npm run typecheck
          python scripts/scan_public_tree.py
          docker compose -f lab/docker-compose.yml config --quiet
          python scripts/build_docs.py
          mkdocs build --strict
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
