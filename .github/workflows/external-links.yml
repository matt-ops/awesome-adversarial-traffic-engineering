name: Review external source links

on:
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * 1"

permissions:
  contents: read

jobs:
  external-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install source-ledger dependency
        run: python -m pip install PyYAML==6.0.2
      - name: Classify external links
        run: >-
          python scripts/check_external_links.py
          --fail-on-permanent
          --output artifacts/external-links.json
      - name: Upload link-review details
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: external-link-review
          path: artifacts/external-links.json
